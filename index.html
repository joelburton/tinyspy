<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- viewport-fit=cover lets content draw under the notch / rounded corners /
         home indicator, which is what makes the env(safe-area-inset-*) values
         resolve to non-zero — WITHOUT it they're all 0 and any inset() that
         reads them is inert. FloatingPanel's phone sheet uses those insets to
         keep its header clear of the notch in standalone (home-screen) mode.
         status-bar-style stays `default` (a solid bar, not translucent), so
         top-of-page content isn't tucked under the status bar.
         CAVEAT: with `cover`, EVERY full-bleed surface owns its own safe-area
         padding (the browser stops letterboxing) — verify on a notched device
         that the header / club page / toasts don't slip under the notch or the
         home indicator. See docs/code-review-mobile.md (finding 4). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Installable / home-screen web app. The manifest's `scope: "/"` +
         `display: "standalone"` are the fix for iOS dropping the browser chrome
         back in mid-app: without a manifest, an added-to-home-screen app gets a
         narrow IMPLICIT scope (roughly the add-time path), so navigating to a
         route outside it — e.g. a game at /g/… when the app was added from the
         club page — makes iOS reveal its "out of scope" URL/back/share bar.
         Declaring the whole origin in-scope keeps every route standalone.
         The apple-* metas cover iOS versions that predate manifest support.
         NOTE: iOS caches this at add-time — after this ships, REMOVE and
         RE-ADD the app to the home screen for it to take effect. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#fafafa" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PuzPuzPuz" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <title>PuzPuzPuz</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
