  <rect x="9"  y="3"  width="5" height="5" rx="1" fill="#b4986e"/>
  <rect x="15" y="3"  width="5" height="5" rx="1" fill="#38a169"/>
  <rect x="21" y="3"  width="5" height="5" rx="1" fill="#b4986e"/>
  <rect x="27" y="3"  width="2" height="5" rx="1" fill="#38a169"/>

  <rect x="3"  y="9"  width="5" height="5" rx="1" fill="#b4986e"/>
  <rect x="9"  y="9"  width="5" height="5" rx="1" fill="#38a169"/>
  <rect x="15" y="9"  width="5" height="5" rx="1" fill="#b4986e"/>
  <rect x="21" y="9"  width="5" height="5" rx="1" fill="#38a169"/>
  <rect x="27" y="9"  width="2" height="5" rx="1" fill="#b4986e"/>

  <rect x="3"  y="15" width="5" height="5" rx="1" fill="#38a169"/>
  <rect x="9"  y="15" width="5" height="5" rx="1" fill="#000000"/>
