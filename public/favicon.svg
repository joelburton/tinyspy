  <rect x="27" y="21" width="2" height="5" rx="1" fill="#38a169"/>

  <rect x="3"  y="27" width="5" height="2" rx="1" fill="#38a169"/>
  <rect x="9"  y="27" width="5" height="2" rx="1" fill="#b4986e"/>
  <rect x="15" y="27" width="5" height="2" rx="1" fill="#38a169"/>
