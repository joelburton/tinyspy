# Continuous integration — the STACK-FREE gates.
#
# Nothing else runs the suites automatically, so a forgotten local run could ship
# a type error, a lint regression, or a broken FE test. This runs the checks that
# need neither a Supabase stack nor a browser — the type-check, the linter, and
# the Vitest suite (jsdom + a mocked client) — on every push + pull request. See
# docs/testing.md → "Running the suites" for the full picture.
#
# Deliberately NOT here (need a live stack, so they stay local):
#   - npm run test:db   — pgTAP; needs a local Supabase Postgres (a service
#     container) to run.
#   - npm run test:edge — Deno tests for the edge-function pure logic; would need
#     Deno set up in CI (small, a candidate to add).
#   - npm run test:e2e  — Playwright; needs the full live stack + browsers.
#
# `tsc -b` (not `npm run build`) skips the vite bundle — CI only needs the
# type-check, and it's faster without the build.

name: CI

on:
  push:
  pull_request:

# One run per ref; a new push cancels an in-progress run on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check (tsc -b)
        run: npx tsc -b
      - name: Lint (eslint)
        run: npm run lint
      - name: Unit tests (Vitest)
        run: npm run test:fe -- --run
