<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="MonkeyGram">
  <g font-family="system-ui, sans-serif" font-weight="700" font-size="12" fill="#4a3b22" text-anchor="middle">
    <!-- A mini crossword: CAT across, MAP down, sharing the A. -->
    <g>
      <rect x="23" y="3"  width="18" height="18" rx="3" fill="#f3e3bf" stroke="#cdb887"/>
      <text x="32" y="16">M</text>
    </g>
    <g>
      <rect x="3"  y="23" width="18" height="18" rx="3" fill="#f3e3bf" stroke="#cdb887"/>
      <text x="12" y="36">C</text>
    </g>
    <g>
      <rect x="23" y="23" width="18" height="18" rx="3" fill="#f3e3bf" stroke="#cdb887"/>
      <text x="32" y="36">A</text>
    </g>
    <g>
      <rect x="43" y="23" width="18" height="18" rx="3" fill="#f3e3bf" stroke="#cdb887"/>
      <text x="52" y="36">T</text>
    </g>
    <g>
      <rect x="23" y="43" width="18" height="18" rx="3" fill="#f3e3bf" stroke="#cdb887"/>
      <text x="32" y="56">P</text>
    </g>
  </g>
</svg>
