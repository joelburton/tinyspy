<!-- wordwheel logo: the word wheel — a large saturated-red centre hub ringed by
     eight warm-neutral outer tiles, on a rounded rect in a light warm ground. The
     centre is the "used in every word" tile; the eight outer tiles ring it exactly
     as the on-screen board does. Colours mirror theme.css (--wordwheel-accent /
     -accent-edge for the centre, the warm tile ramp for the ring); SVG files can't
     read CSS custom properties, so the hex values are inlined. Faint spokes tie the
     hub to the ring so it reads as a wheel even at small sizes. -->
<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="wordwheel" viewBox="0 0 2000 2000">
  <rect x="30" y="30" width="1940" height="1940" rx="240" fill="#efe7d8" stroke="#b8ad97" stroke-width="60"/>
  <!-- Spokes from hub to each outer tile (drawn under the tiles). -->
  <g stroke="#c9bfa6" stroke-width="34" stroke-linecap="round">
    <line x1="1000" y1="1000" x2="1000" y2="360"/>
    <line x1="1000" y1="1000" x2="1452.5" y2="547.5"/>
    <line x1="1000" y1="1000" x2="1640" y2="1000"/>
    <line x1="1000" y1="1000" x2="1452.5" y2="1452.5"/>
    <line x1="1000" y1="1000" x2="1000" y2="1640"/>
    <line x1="1000" y1="1000" x2="547.5" y2="1452.5"/>
    <line x1="1000" y1="1000" x2="360" y2="1000"/>
    <line x1="1000" y1="1000" x2="547.5" y2="547.5"/>
  </g>
  <!-- Eight outer tiles (warm neutral), clockwise from the top. -->
  <g fill="#f6f0e3" stroke="#b8ad97" stroke-width="26">
    <circle cx="1000" cy="360" r="150"/>
    <circle cx="1452.5" cy="547.5" r="150"/>
    <circle cx="1640" cy="1000" r="150"/>
    <circle cx="1452.5" cy="1452.5" r="150"/>
    <circle cx="1000" cy="1640" r="150"/>
    <circle cx="547.5" cy="1452.5" r="150"/>
    <circle cx="360" cy="1000" r="150"/>
    <circle cx="547.5" cy="547.5" r="150"/>
  </g>
  <!-- Centre hub (saturated red). -->
  <circle cx="1000" cy="1000" r="300" fill="#d6494f" stroke="#9e2c31" stroke-width="34"/>
</svg>
