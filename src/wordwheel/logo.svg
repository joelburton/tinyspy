<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- wordwheel logo: the word wheel, mirroring the on-screen board. A large
     saturated-red centre tile ringed by eight warm-neutral outer tiles, each with
     a thick gold border (the tile-5-border token) and each TANGENT to the centre +
     its neighbours (the same tangency the board geometry uses). The tiles sit
     directly on a dark rounded-rect card — no inner ground, matching the board's
     no-tray look. Colours are inlined from the theme (tile-2 fill, tile-5-border
     stroke, wordwheel-accent centre); SVG files can't read CSS custom properties.
     (NOTE: XML comments must not contain a double hyphen, so token names here are
     written without their leading dashes; a stray one makes the whole SVG invalid
     XML and it silently fails to render as an img / ?url import.) -->

<svg
   role="img"
   aria-label="wordwheel"
   viewBox="0 0 2000 2000"
   version="1.1"
   id="svg9"
   sodipodi:docname="logo.svg"
   inkscape:version="1.4.4 (dcaf3e7, 2026-05-05)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs9" />
  <sodipodi:namedview
     id="namedview9"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="0.104"
     inkscape:cx="1000"
     inkscape:cy="1000"
     inkscape:window-width="1512"
     inkscape:window-height="735"
     inkscape:window-x="0"
     inkscape:window-y="38"
     inkscape:window-maximized="0"
     inkscape:current-layer="svg9" />
  <rect
     x="30"
     y="30"
     width="1940"
     height="1940"
     rx="240"
     fill="#423829"
     stroke="#2b2419"
     stroke-width="30"
     id="rect1"
     style="fill:none" />
  <!-- Eight outer tiles (warm neutral, thick gold border), clockwise from the top,
       tangent to the centre + each other. -->
  <g
     fill="#f6efdf"
     stroke="#d2b060"
     stroke-width="79"
     id="g8">
    <circle
       cx="1000"
       cy="407"
       r="227"
       id="circle1" />
    <circle
       cx="1419"
       cy="581"
       r="227"
       id="circle2" />
    <circle
       cx="1593"
       cy="1000"
       r="227"
       id="circle3" />
    <circle
       cx="1419"
       cy="1419"
       r="227"
       id="circle4" />
    <circle
       cx="1000"
       cy="1593"
       r="227"
       id="circle5" />
    <circle
       cx="581"
       cy="1419"
       r="227"
       id="circle6" />
    <circle
       cx="407"
       cy="1000"
       r="227"
       id="circle7" />
    <circle
       cx="581"
       cy="581"
       r="227"
       id="circle8" />
  </g>
  <!-- Centre hub (saturated red, same thick gold border), drawn last so it reads crisp. -->
  <circle
     cx="1000"
     cy="1000"
     r="366"
     fill="#d6494f"
     stroke="#d2b060"
     stroke-width="79"
     id="circle9" />
</svg>
