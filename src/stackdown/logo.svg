<!-- stackdown logo — overlapping lettered tiles cascading down a stack,
     shaded light-to-dark for depth (the depthColor ramp in the game).
     Hand-authored; no external source. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 64" role="img" aria-label="stackdown">
  <g font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="34" text-anchor="middle" fill="#2a2a2a" stroke="rgba(0,0,0,0.2)" stroke-width="2">
    <g>
      <rect x="6" y="20" width="44" height="44" rx="7" fill="hsl(41 42% 60%)"/>
      <text x="28" y="55" stroke="none">S</text>
    </g>
    <g>
      <rect x="40" y="14" width="44" height="44" rx="7" fill="hsl(41 42% 69%)"/>
      <text x="62" y="49" stroke="none">T</text>
    </g>
    <g>
      <rect x="74" y="8" width="44" height="44" rx="7" fill="hsl(41 42% 78%)"/>
      <text x="96" y="43" stroke="none">A</text>
    </g>
    <g>
      <rect x="108" y="2" width="44" height="44" rx="7" fill="hsl(41 42% 86%)"/>
      <text x="130" y="37" stroke="none">K</text>
    </g>
  </g>
</svg>
